version: "3.9"

services:
  api:
    build: .
    container_name: scheme_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://schemes_user:schemes_pass@db:5432/schemes_db
      REDIS_URL: memory://local
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: scheme_db
    environment:
      POSTGRES_USER: schemes_user
      POSTGRES_PASSWORD: schemes_pass
      POSTGRES_DB: schemes_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schemes_user -d schemes_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
